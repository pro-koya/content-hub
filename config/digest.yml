# ============================================================
# Digest Generation Configuration
# 毎朝要約の対象とルールを宣言的に管理
# ============================================================

# 全体設定
global:
  # 合計最大記事数（朝30分で読める分量）
  max_total_items: 50
  # 対象範囲（過去N時間の記事）
  lookback_hours: 24
  # 要約方法: auto / llm / extractive
  # auto: LLM(Gemini)が使えれば使用、なければ extractive（推奨）
  # 環境変数 SUMMARIZER で上書き可能
  summarizer: auto
  # 要約の文数
  summary_sentences: 5
  # 出力先ディレクトリ
  output_dir: docs/digests

# カテゴリ別設定
categories:
  AI_RESEARCH:
    max_items: 8
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  AI_PRODUCT_SAAS:
    max_items: 7
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  MACRO_STRUCTURE:
    max_items: 5
    priority: newest_first
    relevance_tags: ["本業"]

  JAPAN_SIGNAL:
    max_items: 6
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  AGRICULTURE:
    max_items: 4
    priority: newest_first
    relevance_tags: ["農業"]

  AI_DRIVEN_DEV:
    max_items: 5
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  CAREER_HYBRID:
    max_items: 3
    priority: newest_first
    relevance_tags: ["キャリア"]

  QIITA_TRENDING:
    max_items: 5
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  NOTE_TRENDING:
    max_items: 4
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  X_BUZZ:
    max_items: 3
    priority: newest_first
    relevance_tags: ["本業"]
