# ============================================================
# Digest Generation Configuration
# QiitaとZennのRSSのみを収集（API不使用）
# ============================================================

# 全体設定
global:
  # 合計最大記事数
  max_total_items: 20
  # 対象範囲（過去N時間の記事）
  lookback_hours: 24
  # 要約方法: extractive（API不使用）
  summarizer: extractive
  # 要約の文数
  summary_sentences: 3
  # 出力先ディレクトリ
  output_dir: docs/digests

# カテゴリ別設定
categories:
  QIITA_TRENDING:
    max_items: 10
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]

  ZENN_TRENDING:
    max_items: 10
    priority: newest_first
    relevance_tags: ["本業", "個人開発"]
